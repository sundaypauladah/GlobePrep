  <script>
    const { useState, useEffect, useCallback, createElement: h } = React;

    const CATEGORIES = {
      countries: { name: "Countries", icon: "\u{1F30D}", color: "#2563eb" },
      travel: { name: "Travel", icon: "\u2708\uFE0F", color: "#059669" },
      currentAffairs: { name: "Current Affairs", icon: "\u{1F4F0}", color: "#dc2626" },
      history: { name: "History", icon: "\u{1F3DB}\uFE0F", color: "#7c3aed" },
      africanHistory: { name: "African History", icon: "\u{1F30D}", color: "#d97706" },
      nigerianConstitution: { name: "Nigerian Constitution", icon: "\u{1F1F3}\u{1F1EC}", color: "#16a34a" },
      southSudanConstitution: { name: "South Sudan Constitution", icon: "\u{1F1F8}\u{1F1F8}", color: "#0e7490" },
      southSudanHistory: { name: "South Sudan History", icon: "\u{1F3DB}\uFE0F", color: "#b45309" },
      southSudanGeography: { name: "South Sudan Geography", icon: "\u{1F30A}", color: "#0284c7" },
    };

    const QUESTIONS = [
      // COUNTRIES — Easy
      { id:1, category:"countries", difficulty:"easy", q:"What is the capital of Australia?", options:["Sydney","Melbourne","Canberra","Brisbane"], answer:2, explanation:"Canberra is Australia's capital, purpose-built as a compromise between rivals Sydney and Melbourne." },
      { id:2, category:"countries", difficulty:"easy", q:"What is the smallest country in the world by area?", options:["Monaco","Vatican City","San Marino","Liechtenstein"], answer:1, explanation:"Vatican City covers only about 0.44 km\u00B2, making it the world's smallest independent state." },
      { id:3, category:"countries", difficulty:"easy", q:"What is the most spoken native language in the world?", options:["English","Hindi","Mandarin Chinese","Spanish"], answer:2, explanation:"Mandarin Chinese has the most native speakers, with over 900 million people." },
      { id:4, category:"countries", difficulty:"easy", q:"Which country's flag is not rectangular?", options:["Switzerland","Nepal","Bhutan","Japan"], answer:1, explanation:"Nepal's flag is the only national flag that is not rectangular \u2014 it consists of two stacked triangles." },
      // COUNTRIES — Medium
      { id:5, category:"countries", difficulty:"medium", q:"Which country has the longest coastline in the world?", options:["Indonesia","Australia","Canada","Russia"], answer:2, explanation:"Canada has the world's longest coastline at over 202,000 km, touching three oceans." },
      { id:6, category:"countries", difficulty:"medium", q:"Which country has the most official languages (11)?", options:["India","South Africa","Switzerland","Bolivia"], answer:1, explanation:"South Africa recognises 11 official languages including Zulu, Xhosa, Afrikaans, and English." },
      { id:7, category:"countries", difficulty:"medium", q:"Which African country was never colonised by a European power?", options:["Ghana","Ethiopia","Kenya","Nigeria"], answer:1, explanation:"Ethiopia (along with Liberia) is one of only two African countries never formally colonised, having resisted Italian invasion at the Battle of Adwa in 1896." },
      { id:8, category:"countries", difficulty:"medium", q:"Which Southeast Asian country changed its name from Burma?", options:["Laos","Cambodia","Myanmar","Thailand"], answer:2, explanation:"Myanmar was officially known as Burma until the military government changed the name in 1989." },
      // COUNTRIES — Hard
      { id:9, category:"countries", difficulty:"hard", q:"Which country spans the most time zones?", options:["Russia","France","United States","China"], answer:1, explanation:"France spans 12 time zones (including overseas territories), more than any other country." },
      { id:10, category:"countries", difficulty:"hard", q:"In which country would you find the city of Timbuktu?", options:["Niger","Mali","Senegal","Burkina Faso"], answer:1, explanation:"Timbuktu is a historic city in Mali, once a major centre of Islamic scholarship and trade." },
      { id:11, category:"countries", difficulty:"hard", q:"Which two countries are doubly landlocked?", options:["Nepal & Mongolia","Liechtenstein & Uzbekistan","Paraguay & Bolivia","Chad & Niger"], answer:1, explanation:"Liechtenstein (in Europe) and Uzbekistan (in Central Asia) are the only two doubly landlocked countries." },
      { id:12, category:"countries", difficulty:"hard", q:"Which country is home to the world's oldest university still in operation?", options:["Italy","Morocco","Egypt","Greece"], answer:1, explanation:"The University of al-Qarawiyyin in Fez, Morocco, founded in 859 AD, is recognised by UNESCO and Guinness as the oldest existing, continually operating educational institution." },

      // TRAVEL — Easy
      { id:13, category:"travel", difficulty:"easy", q:"What currency is used in Japan?", options:["Yuan","Won","Yen","Ringgit"], answer:2, explanation:"The Japanese yen (\u00A5) is the official currency of Japan and one of the most traded currencies globally." },
      { id:14, category:"travel", difficulty:"easy", q:"In which country would you find Machu Picchu?", options:["Bolivia","Peru","Ecuador","Colombia"], answer:1, explanation:"Machu Picchu is a 15th-century Inca citadel situated high in the Andes Mountains of Peru." },
      { id:15, category:"travel", difficulty:"easy", q:"Which European city is known as the 'City of Canals'?", options:["Amsterdam","Venice","Bruges","Stockholm"], answer:1, explanation:"Venice, Italy, is famously known as the City of Canals, built on over 100 small islands in the Adriatic Sea." },
      { id:16, category:"travel", difficulty:"easy", q:"In which city would you find the Blue Mosque and Hagia Sophia?", options:["Cairo","Tehran","Istanbul","Marrakech"], answer:2, explanation:"Both landmarks are in Istanbul, Turkey \u2014 a city that straddles two continents." },
      // TRAVEL — Medium
      { id:17, category:"travel", difficulty:"medium", q:"Which city is home to the Sagrada Fam\u00EDlia basilica?", options:["Madrid","Barcelona","Lisbon","Rome"], answer:1, explanation:"The Sagrada Fam\u00EDlia, designed by Antoni Gaud\u00ED, has been under construction in Barcelona since 1882." },
      { id:18, category:"travel", difficulty:"medium", q:"What language would you primarily need to study abroad in S\u00E3o Paulo?", options:["Spanish","Portuguese","French","English"], answer:1, explanation:"Brazil's official language is Portuguese; S\u00E3o Paulo is the country's largest city and a major study-abroad destination." },
      { id:19, category:"travel", difficulty:"medium", q:"What is the busiest airport in the world by passenger traffic?", options:["London Heathrow","Dubai International","Hartsfield-Jackson Atlanta","Beijing Capital"], answer:2, explanation:"Hartsfield-Jackson Atlanta International Airport has been the world's busiest airport by passenger numbers for over two decades." },
      { id:20, category:"travel", difficulty:"medium", q:"The Trans-Siberian Railway connects Moscow to which city?", options:["Beijing","Vladivostok","Ulaanbaatar","Irkutsk"], answer:1, explanation:"The Trans-Siberian Railway runs from Moscow to Vladivostok, covering 9,289 km \u2014 the longest railway line in the world." },
      // TRAVEL — Hard
      { id:21, category:"travel", difficulty:"hard", q:"The Schengen Area allows passport-free travel across how many European countries?", options:["22","25","27","29"], answer:2, explanation:"As of 2024, the Schengen Area comprises 27 European countries with no internal border controls." },
      { id:22, category:"travel", difficulty:"hard", q:"Which airport has the IATA code 'NRT'?", options:["Newark","Narita (Tokyo)","Nuremberg","Noumea"], answer:1, explanation:"NRT is the IATA code for Narita International Airport, one of Tokyo's two major airports." },
      { id:23, category:"travel", difficulty:"hard", q:"Which country requires visitors to pay a daily 'Sustainable Development Fee'?", options:["Maldives","Bhutan","Iceland","New Zealand"], answer:1, explanation:"Bhutan charges a daily Sustainable Development Fee to manage tourism sustainably and preserve its culture and environment." },
      { id:24, category:"travel", difficulty:"hard", q:"Which Mediterranean island is the largest by area?", options:["Sardinia","Crete","Sicily","Cyprus"], answer:2, explanation:"Sicily, at about 25,711 km\u00B2, is the largest island in the Mediterranean Sea." },

      // CURRENT AFFAIRS — Easy
      { id:25, category:"currentAffairs", difficulty:"easy", q:"Which country hosted the 2024 Summer Olympic Games?", options:["Japan","France","USA","Australia"], answer:1, explanation:"Paris, France hosted the 2024 Summer Olympics, with events held at iconic locations including the Eiffel Tower and Versailles." },
      { id:26, category:"currentAffairs", difficulty:"easy", q:"What is the main currency of the United Kingdom after Brexit?", options:["Euro","Pound Sterling","Dollar","Crown"], answer:1, explanation:"The UK uses the pound sterling (\u00A3) and never adopted the euro, even before Brexit." },
      { id:27, category:"currentAffairs", difficulty:"easy", q:"What global health emergency was declared over by the WHO in May 2023?", options:["Ebola","Monkeypox","COVID-19","Zika"], answer:2, explanation:"The WHO declared an end to COVID-19 as a public health emergency of international concern on May 5, 2023." },
      { id:28, category:"currentAffairs", difficulty:"easy", q:"The Sustainable Development Goals (SDGs) are set to be achieved by which year?", options:["2025","2030","2035","2050"], answer:1, explanation:"The 17 SDGs were adopted in 2015 with a target date of 2030 for sustainable development worldwide." },
      // CURRENT AFFAIRS — Medium
      { id:29, category:"currentAffairs", difficulty:"medium", q:"Which organisation's headquarters is located in Geneva, Switzerland?", options:["United Nations (main HQ)","World Health Organization","NATO","World Bank"], answer:1, explanation:"The WHO is headquartered in Geneva. The main UN HQ is in New York, NATO in Brussels, and the World Bank in Washington, D.C." },
      { id:30, category:"currentAffairs", difficulty:"medium", q:"BRICS is an economic alliance. What does the 'S' stand for?", options:["Singapore","Saudi Arabia","South Africa","Spain"], answer:2, explanation:"BRICS originally stood for Brazil, Russia, India, China, and South Africa. The group has since expanded to include more members." },
      { id:31, category:"currentAffairs", difficulty:"medium", q:"Which international court is based in The Hague, Netherlands?", options:["European Court of Justice","International Criminal Court","Court of Arbitration for Sport","Inter-American Court"], answer:1, explanation:"The International Criminal Court (ICC) is based in The Hague, along with the International Court of Justice." },
      { id:32, category:"currentAffairs", difficulty:"medium", q:"Which Scandinavian country joined NATO in 2024 after decades of neutrality?", options:["Finland","Sweden","Norway","Denmark"], answer:1, explanation:"Sweden officially joined NATO in March 2024, ending over 200 years of military non-alignment." },
      // CURRENT AFFAIRS — Hard
      { id:33, category:"currentAffairs", difficulty:"hard", q:"What does 'COP' stand for in climate summits like COP28?", options:["Climate Operations Protocol","Conference of the Parties","Council of Parliaments","Committee on Pollution"], answer:1, explanation:"COP stands for Conference of the Parties, referring to the nations that signed the UN Framework Convention on Climate Change." },
      { id:34, category:"currentAffairs", difficulty:"hard", q:"The European Union uses the euro. Which EU member does NOT use the euro?", options:["Portugal","Finland","Sweden","Austria"], answer:2, explanation:"Sweden is an EU member but has not adopted the euro, continuing to use the Swedish krona." },
      { id:35, category:"currentAffairs", difficulty:"hard", q:"Which country became the first to land a spacecraft near the Moon's south pole in 2023?", options:["China","India","Japan","USA"], answer:1, explanation:"India's Chandrayaan-3 mission successfully landed near the Moon's south pole in August 2023, a historic first." },
      { id:36, category:"currentAffairs", difficulty:"hard", q:"Which tech regulation, the world's first comprehensive AI law, was passed by the EU?", options:["Digital Services Act","AI Act","GDPR II","Tech Accountability Act"], answer:1, explanation:"The EU AI Act, passed in 2024, is the world's first comprehensive legal framework regulating artificial intelligence." },

      // HISTORY — Easy
      { id:37, category:"history", difficulty:"easy", q:"The Berlin Wall fell in which year?", options:["1987","1989","1991","1993"], answer:1, explanation:"The Berlin Wall fell on November 9, 1989, leading to German reunification in 1990." },
      { id:38, category:"history", difficulty:"easy", q:"Who was the first woman to win a Nobel Prize?", options:["Rosalind Franklin","Marie Curie","Dorothy Hodgkin","Lise Meitner"], answer:1, explanation:"Marie Curie won the Nobel Prize in Physics in 1903 and later in Chemistry in 1911 \u2014 the first person to win in two different sciences." },
      { id:39, category:"history", difficulty:"easy", q:"The Silk Road connected China to which region?", options:["Sub-Saharan Africa","The Mediterranean / Europe","Southeast Asia","The Americas"], answer:1, explanation:"The Silk Road was a network of trade routes connecting China to the Mediterranean, facilitating exchange of goods, ideas, and cultures." },
      { id:40, category:"history", difficulty:"easy", q:"The Ottoman Empire was centred in which modern-day country?", options:["Iran","Turkey","Egypt","Iraq"], answer:1, explanation:"The Ottoman Empire was centred in modern-day Turkey, with Istanbul (Constantinople) as its capital for centuries." },
      // HISTORY — Medium
      { id:41, category:"history", difficulty:"medium", q:"The Partition of India in 1947 created which two independent nations?", options:["India & Bangladesh","India & Pakistan","India & Sri Lanka","India & Myanmar"], answer:1, explanation:"The 1947 partition created India and Pakistan (which then included East Pakistan, later becoming Bangladesh in 1971)." },
      { id:42, category:"history", difficulty:"medium", q:"The Rwandan genocide occurred in which year?", options:["1990","1992","1994","1996"], answer:2, explanation:"The Rwandan genocide took place in 1994, resulting in the deaths of an estimated 800,000 people in approximately 100 days." },
      { id:43, category:"history", difficulty:"medium", q:"Which explorer is credited with the first circumnavigation of the globe?", options:["Christopher Columbus","Ferdinand Magellan / Juan Sebasti\u00E1n Elcano","Vasco da Gama","James Cook"], answer:1, explanation:"Magellan's expedition (1519\u20131522) completed the first circumnavigation, though Magellan died in the Philippines and Elcano finished the voyage." },
      { id:44, category:"history", difficulty:"medium", q:"Which treaty established the European Economic Community in 1957?", options:["Treaty of Versailles","Treaty of Rome","Maastricht Treaty","Treaty of Lisbon"], answer:1, explanation:"The Treaty of Rome (1957) established the EEC, a precursor to today's European Union." },
      // HISTORY — Hard
      { id:45, category:"history", difficulty:"hard", q:"Which ancient civilisation built the city of Petra, carved into rock?", options:["Romans","Nabataeans","Egyptians","Persians"], answer:1, explanation:"The Nabataeans, an ancient Arab people, carved the city of Petra in modern-day Jordan around the 4th century BC." },
      { id:46, category:"history", difficulty:"hard", q:"The Meiji Restoration modernised which country in the late 1800s?", options:["China","Korea","Japan","Thailand"], answer:2, explanation:"The Meiji Restoration (1868) transformed Japan from a feudal society into a modern industrialised nation." },
      { id:47, category:"history", difficulty:"hard", q:"Which empire was ruled by Mansa Musa, considered one of the wealthiest people in history?", options:["Songhai Empire","Mali Empire","Axum Empire","Ghana Empire"], answer:1, explanation:"Mansa Musa ruled the Mali Empire in the 14th century and his famous pilgrimage to Mecca showcased immense wealth." },
      { id:48, category:"history", difficulty:"hard", q:"Which ancient wonder was located in Alexandria, Egypt?", options:["Colossus of Rhodes","Hanging Gardens","Great Lighthouse (Pharos)","Temple of Artemis"], answer:2, explanation:"The Lighthouse of Alexandria (Pharos) was one of the Seven Wonders of the Ancient World, guiding sailors for centuries." },

      // AFRICAN HISTORY — Easy
      { id:49, category:"africanHistory", difficulty:"easy", q:"Nelson Mandela was imprisoned for how many years before his release in 1990?", options:["15 years","21 years","27 years","32 years"], answer:2, explanation:"Mandela spent 27 years in prison, mostly on Robben Island, before being released in 1990 and becoming South Africa's first Black president in 1994." },
      { id:50, category:"africanHistory", difficulty:"easy", q:"Who led Ghana to independence in 1957, making it the first sub-Saharan African country to gain independence?", options:["Jomo Kenyatta","Kwame Nkrumah","Julius Nyerere","Patrice Lumumba"], answer:1, explanation:"Kwame Nkrumah became Ghana's first prime minister and later president, and was a key figure in the Pan-African movement." },
      { id:51, category:"africanHistory", difficulty:"easy", q:"The Scramble for Africa, where European powers divided the continent, was formalised at which 1884\u201385 conference?", options:["Treaty of Versailles","Berlin Conference","Congress of Vienna","London Conference"], answer:1, explanation:"The Berlin Conference of 1884\u201385 set rules for European colonisation of Africa, with no African leaders invited to participate." },
      { id:52, category:"africanHistory", difficulty:"easy", q:"Which ancient Egyptian pharaoh is famous for the massive temple complex at Abu Simbel?", options:["Tutankhamun","Cleopatra","Ramesses II","Hatshepsut"], answer:2, explanation:"Ramesses II (Ramesses the Great) built the Abu Simbel temples around 1264 BC. They were relocated in the 1960s to avoid flooding from the Aswan Dam." },
      // AFRICAN HISTORY — Medium
      { id:53, category:"africanHistory", difficulty:"medium", q:"The Great Zimbabwe ruins, built between the 11th and 15th centuries, are located in which country?", options:["Zambia","Mozambique","Zimbabwe","Botswana"], answer:2, explanation:"Great Zimbabwe was a medieval city and the capital of the Kingdom of Zimbabwe. The modern country takes its name from these ruins." },
      { id:54, category:"africanHistory", difficulty:"medium", q:"The Mau Mau uprising (1952\u20131960) was a rebellion against British colonial rule in which country?", options:["Nigeria","Uganda","Kenya","Tanzania"], answer:2, explanation:"The Mau Mau uprising in Kenya was a significant anti-colonial movement that contributed to Kenya gaining independence in 1963." },
      { id:55, category:"africanHistory", difficulty:"medium", q:"The Organisation of African Unity (OAU), predecessor to the African Union, was founded in which year?", options:["1955","1960","1963","1970"], answer:2, explanation:"The OAU was founded on 25 May 1963 in Addis Ababa, Ethiopia. This date is now celebrated as Africa Day." },
      { id:56, category:"africanHistory", difficulty:"medium", q:"The Kingdom of Aksum, one of the great ancient civilisations, was located in modern-day\u2026?", options:["Nigeria","Ethiopia & Eritrea","South Africa","Morocco"], answer:1, explanation:"The Aksumite Empire flourished in modern-day Ethiopia and Eritrea from roughly 100\u2013940 AD, and was one of the four great powers of the ancient world." },
      // AFRICAN HISTORY — Hard
      { id:57, category:"africanHistory", difficulty:"hard", q:"Which African empire controlled trans-Saharan trade routes and had Timbuktu as a centre of learning?", options:["Songhai Empire","Benin Empire","Zulu Kingdom","Kongo Kingdom"], answer:0, explanation:"The Songhai Empire (15th\u201316th century) was one of the largest empires in African history, with Timbuktu and Djenn\u00E9 as major intellectual centres." },
      { id:58, category:"africanHistory", difficulty:"hard", q:"Which queen led resistance against Italian colonisation of Ethiopia in the late 19th century alongside Emperor Menelik II?", options:["Queen Nzinga","Empress Taytu Betul","Queen Amina","Yaa Asantewaa"], answer:1, explanation:"Empress Taytu Betul played a crucial strategic role at the Battle of Adwa in 1896, where Ethiopia defeated Italy and preserved its independence." },
      { id:59, category:"africanHistory", difficulty:"hard", q:"Queen Nzinga of Ndongo and Matamba resisted Portuguese colonisation in which modern-day country?", options:["Mozambique","Angola","Congo","Guinea-Bissau"], answer:1, explanation:"Queen Nzinga (1583\u20131663) was a formidable leader who resisted Portuguese slave trade and colonisation in modern-day Angola for decades." },
      { id:60, category:"africanHistory", difficulty:"hard", q:"Which West African kingdom, famous for its bronze sculptures, was located in present-day Nigeria?", options:["Ashanti Kingdom","Kingdom of Dahomey","Benin Kingdom","Oyo Empire"], answer:2, explanation:"The Benin Kingdom (not to be confused with modern Benin) was renowned for its intricate bronze and brass sculptures, many of which were looted by the British in 1897." },

      // NIGERIAN CONSTITUTION — Easy
      { id:61, category:"nigerianConstitution", difficulty:"easy", q:"The current Nigerian Constitution was enacted in which year?", options:["1963","1979","1989","1999"], answer:3, explanation:"The 1999 Constitution is Nigeria's current governing document, enacted during the transition from military to civilian rule under the Fourth Republic." },
      { id:62, category:"nigerianConstitution", difficulty:"easy", q:"How many states does the Nigerian Constitution recognise?", options:["30","36","42","48"], answer:1, explanation:"Nigeria has 36 states plus the Federal Capital Territory (FCT) Abuja, as established by the Constitution." },
      { id:63, category:"nigerianConstitution", difficulty:"easy", q:"What is the legislative body at the federal level called in Nigeria?", options:["Parliament","National Assembly","House of Congress","Federal Legislature"], answer:1, explanation:"The National Assembly consists of two chambers: the Senate (109 members) and the House of Representatives (360 members)." },
      { id:64, category:"nigerianConstitution", difficulty:"easy", q:"The Constitution vests executive power of the Federation in which office?", options:["Vice President","National Assembly","President","Attorney General"], answer:2, explanation:"Section 5 vests the executive powers of the Federation in the President, who may exercise them directly or through the Vice President, Ministers, or officers in the public service." },
      // NIGERIAN CONSTITUTION — Medium
      { id:65, category:"nigerianConstitution", difficulty:"medium", q:"According to the Constitution, what is the minimum age to run for President of Nigeria?", options:["30 years","35 years","40 years","45 years"], answer:2, explanation:"Section 131 of the Constitution states a presidential candidate must be at least 40 years old and a citizen of Nigeria by birth." },
      { id:66, category:"nigerianConstitution", difficulty:"medium", q:"What is the tenure of the President of Nigeria as specified by the Constitution?", options:["4 years, one term only","4 years, maximum two terms","5 years, maximum two terms","6 years, one term only"], answer:1, explanation:"Section 137 provides that the President serves a 4-year term and may be re-elected for one additional term only." },
      { id:67, category:"nigerianConstitution", difficulty:"medium", q:"How many senators represent each state in the Nigerian Senate?", options:["2","3","4","5"], answer:1, explanation:"Each of Nigeria's 36 states elects 3 senators, plus 1 from the FCT, giving a total of 109 senators." },
      { id:68, category:"nigerianConstitution", difficulty:"medium", q:"How many chapters does the 1999 Nigerian Constitution contain?", options:["6","8","10","12"], answer:1, explanation:"The 1999 Constitution is divided into 8 chapters covering topics from the federation, legislature, executive, judiciary, to miscellaneous provisions." },
      // NIGERIAN CONSTITUTION — Hard
      { id:69, category:"nigerianConstitution", difficulty:"hard", q:"Which chapter of the Constitution contains the Fundamental Rights?", options:["Chapter II","Chapter III","Chapter IV","Chapter V"], answer:2, explanation:"Chapter IV (Sections 33\u201346) guarantees fundamental rights including right to life, dignity, personal liberty, fair hearing, freedom of expression, and more." },
      { id:70, category:"nigerianConstitution", difficulty:"hard", q:"The Fundamental Objectives and Directive Principles of State Policy are in which chapter?", options:["Chapter I","Chapter II","Chapter III","Chapter IV"], answer:1, explanation:"Chapter II outlines the ideals the government should strive toward, though these provisions are generally not justiciable (enforceable in court)." },
      { id:71, category:"nigerianConstitution", difficulty:"hard", q:"According to the Constitution, who is the Chief Justice of Nigeria appointed by?", options:["National Assembly","Senate alone","President on recommendation of the NJC","State Governors"], answer:2, explanation:"The President appoints the Chief Justice of Nigeria on the recommendation of the National Judicial Council (NJC), subject to confirmation by the Senate." },
      { id:72, category:"nigerianConstitution", difficulty:"hard", q:"Which section of the Constitution grants the right to freedom of expression?", options:["Section 33","Section 36","Section 39","Section 42"], answer:2, explanation:"Section 39 guarantees every person the right to freedom of expression, including the right to hold opinions and to receive and impart ideas and information." },

      // SOUTH SUDAN CONSTITUTION — Easy
      { id:73, category:"southSudanConstitution", difficulty:"easy", q:"The Transitional Constitution of South Sudan was adopted in which year?", options:["2005","2009","2011","2013"], answer:2, explanation:"The Transitional Constitution was adopted on 9 July 2011, the same day South Sudan gained independence from Sudan." },
      { id:74, category:"southSudanConstitution", difficulty:"easy", q:"What is the capital city of South Sudan as designated in the Constitution?", options:["Malakal","Wau","Juba","Bor"], answer:2, explanation:"Juba is the capital city of South Sudan, located on the White Nile in the southern part of the country." },
      { id:75, category:"southSudanConstitution", difficulty:"easy", q:"According to the Constitution, what is the official language of South Sudan?", options:["Arabic","Dinka","English","Nuer"], answer:2, explanation:"English is the official working language of South Sudan as established by the Transitional Constitution, while all indigenous languages are recognised as national languages." },
      { id:76, category:"southSudanConstitution", difficulty:"easy", q:"Who serves as Commander-in-Chief of the armed forces under the South Sudan Constitution?", options:["Minister of Defence","Chief of General Staff","Vice President","President"], answer:3, explanation:"The President of South Sudan serves as Commander-in-Chief of the Sudan People's Liberation Army (SPLA), now known as the South Sudan People's Defence Forces." },
      // SOUTH SUDAN CONSTITUTION — Medium
      { id:77, category:"southSudanConstitution", difficulty:"medium", q:"South Sudan became independent after a referendum in which over what percentage voted for secession?", options:["75%","85%","92%","98%"], answer:3, explanation:"In the January 2011 referendum, approximately 98.83% of voters chose independence, leading to South Sudan becoming the world's newest country." },
      { id:78, category:"southSudanConstitution", difficulty:"medium", q:"According to the Transitional Constitution, what is the system of government in South Sudan?", options:["Parliamentary","Presidential","Semi-presidential","Federal monarchy"], answer:1, explanation:"The Transitional Constitution establishes a presidential system of government, with the President serving as both Head of State and Head of Government." },
      { id:79, category:"southSudanConstitution", difficulty:"medium", q:"How many states did the Transitional Constitution originally establish?", options:["5","10","15","20"], answer:1, explanation:"The 2011 Transitional Constitution originally established 10 states, though this was later controversially expanded to 28 and then 32 by presidential decree." },
      { id:80, category:"southSudanConstitution", difficulty:"medium", q:"What is the national legislature of South Sudan called?", options:["National Parliament","National Legislature","Federal Assembly","People's Congress"], answer:1, explanation:"The National Legislature is bicameral, consisting of the National Legislative Assembly and the Council of States." },
      // SOUTH SUDAN CONSTITUTION — Hard
      { id:81, category:"southSudanConstitution", difficulty:"hard", q:"The Bill of Rights in the South Sudan Constitution is found in which part?", options:["Part One","Part Two","Part Three","Part Four"], answer:1, explanation:"Part Two of the Transitional Constitution contains the Bill of Rights, guaranteeing fundamental rights and freedoms including life, liberty, and equality before the law." },

        screen === "quiz" && h(QuizScreen, { questions:quizQuestions, category:quizCategory, onFinish:handleFinish, onHome:goHome }),
        screen === "results" && h(ResultsScreen, { results:results, category:quizCategory, onHome:goHome, onRetry:function() { startQuiz(quizCategory); } })
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(GlobePrepApp));
  </script>
</body>
</html>
